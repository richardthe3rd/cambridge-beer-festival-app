# Base mise configuration for all environments (including CI)
# For developer-specific tools (Claude, Firebase), use: MISE_ENV=dev mise install
#
# Task Configuration:
# - Each task can have a 'description' (short summary)
# - Tasks with arguments use 'usage' field with KDL syntax for arg/flag definitions
# - Arguments become available as $usage_<name> env vars (e.g., $usage_file)
# - For complex tasks, consider using file-tasks in .mise/tasks/ for better editing
#   Docs: https://mise.jdx.dev/tasks/task-arguments.html
#         https://mise.jdx.dev/tasks/file-tasks.html

[settings]
experimental = true

[tools]
flutter = "3.38.3"
node = "21"  # For http_server and Playwright e2e tests

[deps.flutter]
auto = true

[tasks.generate]
description = "Generate code (mocks, build_runner)"
run = 'dart run build_runner build --delete-conflicting-outputs'
# Sources: test files with @GenerateMocks annotations
sources = ['test/**/*_test.dart']
# Outputs: generated mock files
outputs = ['test/**/*.mocks.dart']

[tasks.test]
description = "Run all Flutter tests (output saved to $TEST_LOG, or set TEST_LOG to reuse a path)"
depends = ['generate']
run = '''
set -o pipefail
TEST_LOG="${TEST_LOG:-$(mktemp /tmp/test-XXXXXX.log)}"
echo "TEST_LOG=$TEST_LOG"
flutter test 2>&1 | tee "$TEST_LOG"; EXIT_CODE=$?
echo "---"
echo "Grep with: grep -n 'FAILED\|ERROR' $TEST_LOG"
exit $EXIT_CODE
'''

[tasks.check]
description = "Pre-commit gate: generate → analyze + test (run before every commit)"
depends = ['analyze', 'test']
run = 'echo "All checks passed"'

[tasks."goldens:update"]
description = "Regenerate golden screenshot files (omit file arg to update all)"
depends = ['generate']
usage = 'arg "[file]" help="Specific test file to update"'
run = 'flutter test --update-goldens ${usage_file:-}'

[tasks.coverage]
description = "Run tests with coverage reporting (output: coverage/lcov.info)"
depends = ['generate']
run = '''
flutter test --coverage
echo "Coverage report generated at coverage/lcov.info"
echo "To view HTML report, install lcov and run: genhtml coverage/lcov.info -o coverage/html"
'''

[tasks.analyze]
description = "Run Flutter code analysis (output saved to $ANALYZE_LOG, or set ANALYZE_LOG to reuse a path)"
depends = ['generate']
run = '''
set -o pipefail
ANALYZE_LOG="${ANALYZE_LOG:-$(mktemp /tmp/analyze-XXXXXX.log)}"
echo "ANALYZE_LOG=$ANALYZE_LOG"
flutter analyze --no-fatal-infos 2>&1 | tee "$ANALYZE_LOG"; EXIT_CODE=$?
echo "---"
echo "Grep with: grep -n 'error\|warning' $ANALYZE_LOG"
exit $EXIT_CODE
'''

[tasks."validate:festivals"]
description = "Validate festivals.json against schema (mirrors CI)"
dir = "scripts"
sources = ['data/festivals.json', 'docs/code/api/festival-registry-schema.json']
run = 'npm ci && node ../scripts/validate-festivals.js'

[tasks."test:worker"]
description = "Run Cloudflare Worker tests (Vitest + workerd)"
dir = "cloudflare-worker"
sources = ['cloudflare-worker/package.json', 'cloudflare-worker/package-lock.json', 'cloudflare-worker/worker.js', 'cloudflare-worker/test/**/*.js', 'cloudflare-worker/vitest.config.js', 'data/festivals.json']
run = 'npm ci && npm test'
