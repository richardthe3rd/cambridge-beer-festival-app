name: PR Lint

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened

permissions:
  pull-requests: read

jobs:
  lint-pr:
    # Release PRs use "Release X.Y.Z" titles which are not conventional commits
    if: github.head_ref != 'release/next'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
