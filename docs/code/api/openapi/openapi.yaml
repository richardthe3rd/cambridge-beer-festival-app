components:
    schemas:
        Bookmark:
            type: object
            properties:
                name:
                    type: string
                    description: 'Resource name: festivals/{festival}/drinks/{drink}/bookmark.'
                createTime:
                    readOnly: true
                    type: string
                    description: When the bookmark was created.
                    format: date-time
            description: |-
                A drink the caller has bookmarked at a festival.

                 Singleton resource — one per (caller, drink). The resource's mere existence
                 means the drink is bookmarked; deleting it removes the bookmark. The caller
                 is implicit in the auth context.
        ListBookmarksResponse:
            type: object
            properties:
                bookmarks:
                    type: array
                    items:
                        $ref: '#/components/schemas/Bookmark'
                    description: The caller's bookmarks for this page, one per bookmarked drink.
                nextPageToken:
                    type: string
                    description: Token for the next page; empty when there are no more results.
                totalSize:
                    type: integer
                    description: Total number of drinks the caller has bookmarked at this festival.
                    format: int32
            description: Response message for ListBookmarks.
        ListNotesResponse:
            type: object
            properties:
                notes:
                    type: array
                    items:
                        $ref: '#/components/schemas/Note'
                    description: The caller's notes for this page, one per noted drink.
                nextPageToken:
                    type: string
                    description: Token for the next page; empty when there are no more results.
                totalSize:
                    type: integer
                    description: Total number of drinks the caller has notes for at this festival.
                    format: int32
            description: Response message for ListNotes.
        ListReviewSummariesResponse:
            type: object
            properties:
                reviewSummaries:
                    type: array
                    items:
                        $ref: '#/components/schemas/ReviewSummary'
                    description: Aggregate review signals for this page, one per reviewed drink.
                nextPageToken:
                    type: string
                    description: Token for the next page; empty when there are no more results.
                totalSize:
                    type: integer
                    description: Total number of drinks with at least one review at this festival.
                    format: int32
            description: Response message for ListReviewSummaries.
        ListReviewsResponse:
            type: object
            properties:
                reviews:
                    type: array
                    items:
                        $ref: '#/components/schemas/Review'
                    description: The caller's reviews for this page, one per reviewed drink.
                nextPageToken:
                    type: string
                    description: Token for the next page; empty when there are no more results.
                totalSize:
                    type: integer
                    description: Total number of drinks the caller has reviewed at this festival.
                    format: int32
            description: Response message for ListReviews.
        ListTastingSummariesResponse:
            type: object
            properties:
                tastingSummaries:
                    type: array
                    items:
                        $ref: '#/components/schemas/TastingSummary'
                    description: Tasting counts for this page, one per tried drink.
                nextPageToken:
                    type: string
                    description: Token for the next page; empty when there are no more results.
                totalSize:
                    type: integer
                    description: Total number of drinks tried by at least one caller at this festival.
                    format: int32
            description: Response message for ListTastingSummaries.
        ListTastingsResponse:
            type: object
            properties:
                tastings:
                    type: array
                    items:
                        $ref: '#/components/schemas/Tasting'
                    description: The caller's tasting records for this page, one per tried drink.
                nextPageToken:
                    type: string
                    description: Token for the next page; empty when there are no more results.
                totalSize:
                    type: integer
                    description: Total number of drinks the caller has tried at this festival.
                    format: int32
            description: Response message for ListTastings.
        Note:
            required:
                - content
            type: object
            properties:
                name:
                    type: string
                    description: 'Resource name: festivals/{festival}/drinks/{drink}/note.'
                content:
                    type: string
                    description: The caller's note text. Max 2000 Unicode characters.
                updateTime:
                    readOnly: true
                    type: string
                    description: When this note was last written.
                    format: date-time
            description: |-
                The caller's free-text tasting note for one drink at one festival.

                 Singleton resource — one per (caller, drink). The caller is implicit in the
                 auth context. A note is independent of a Review: you can note without rating,
                 or rate without noting.
        Review:
            type: object
            properties:
                name:
                    type: string
                    description: 'Resource name: festivals/{festival}/drinks/{drink}/review.'
                starRating:
                    type: integer
                    description: Star rating, 1–5 inclusive. Absent if the caller has not set a star rating.
                    format: int32
                wouldRecommend:
                    type: boolean
                    description: Whether the caller would recommend this drink. Absent if not answered.
                updateTime:
                    readOnly: true
                    type: string
                    description: When this review was last written.
                    format: date-time
            description: |-
                The caller's review of one drink at one festival: a star rating (1-5) and/or
                 a "would recommend" answer.

                 Singleton resource — one per (caller, drink). The caller is implicit in the
                 auth context; their identity never appears in the resource name, keeping
                 device IDs private and making the sign-in upgrade transparent to clients.

                 Both signals are optional and independent: a caller can rate without
                 answering the recommendation question, or vice versa.
        ReviewSummary:
            type: object
            properties:
                name:
                    type: string
                    description: 'Resource name: festivals/{festival}/reviewSummaries/{drink}.'
                ratingCount:
                    readOnly: true
                    type: integer
                    description: Number of callers who have submitted a star rating.
                    format: int32
                averageRating:
                    readOnly: true
                    type: number
                    description: Mean star rating across all callers (1.0–5.0); 0 when rating_count is 0.
                    format: double
                responseCount:
                    readOnly: true
                    type: integer
                    description: Number of callers who have answered the "would recommend" question.
                    format: int32
                recommendCount:
                    readOnly: true
                    type: integer
                    description: Number of callers who answered "yes" to the recommendation question.
                    format: int32
                recommendRate:
                    readOnly: true
                    type: number
                    description: |-
                        Fraction of responses (0.0–1.0) that would recommend; 0 when
                         response_count is 0.
                    format: double
            description: |-
                Computed, read-only aggregate of all callers' reviews for one drink.

                 Keyed by drink under the festival so the whole festival can be fetched in
                 one paginated call for list/grid views.
        Tasting:
            type: object
            properties:
                name:
                    type: string
                    description: 'Resource name: festivals/{festival}/drinks/{drink}/tasting.'
                pours:
                    type: integer
                    description: |-
                        How many times the caller has had this drink. Absent means one pour.
                         Must be >= 1 when present.
                    format: int32
                createTime:
                    readOnly: true
                    type: string
                    description: When the caller first tried this drink.
                    format: date-time
                updateTime:
                    readOnly: true
                    type: string
                    description: When this record was last updated.
                    format: date-time
            description: |-
                A record that the caller has tried a drink at a festival.

                 Singleton resource — one per (caller, drink). The caller is implicit in the
                 auth context. `pours` tracks how many times the caller has had this drink at
                 the festival (e.g. returned for a second half-pint); absent means one pour.
        TastingSummary:
            type: object
            properties:
                name:
                    type: string
                    description: 'Resource name: festivals/{festival}/tastingSummaries/{drink}.'
                tasterCount:
                    readOnly: true
                    type: integer
                    description: Number of distinct callers who have logged a tasting for this drink.
                    format: int32
                totalPours:
                    readOnly: true
                    type: integer
                    description: Total pours logged across all callers.
                    format: int32
            description: |-
                Computed, read-only aggregate of how many callers have tried a drink.

                 Useful for social discovery ("N people have tried this"). Keyed by drink
                 under the festival, matching the ReviewSummary pattern.
tags:
    - name: MyFestivalService
