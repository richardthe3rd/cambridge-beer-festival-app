            parameters:
                - name: festival
                  in: path
                  description: The festival id.
                  required: true
                  schema:
                    type: string
                - name: drink
                  in: path
                  description: The drink id.
                  required: true
                  schema:
                    type: string
                - name: updateMask
                  in: query
                  description: Fields to update. Omit to replace all writable fields.
                  schema:
                    type: string
                    format: field-mask
            requestBody:
                content:
                    application/json:
                        schema:
