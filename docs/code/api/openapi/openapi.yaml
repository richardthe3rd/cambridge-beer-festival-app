openapi: 3.0.3
info:
    title: MyFestivalService API
    description: |-
        Stores each caller's personal festival state (bookmarks, notes, tastings,
         reviews) and serves back bucket-scoped aggregates. Writes are local-first on
         the client; this service holds the shared, cross-device state.

         All personal resources are singleton resources — one per (caller, drink).
         The caller's identity is resolved from the auth context; it never appears in
         resource names, keeping device IDs private and making the sign-in upgrade
         transparent to existing clients.
    version: 0.0.1
servers:
    - url: https://api.cambeerfestival.app
paths:
    /v1alpha/festivals/{festival}/bookmarks:
        get:
            tags:
                - MyFestivalService
            description: |-
                List all drinks the caller has bookmarked at a festival.

                 Intended for pre-loading "my festival" state on app open.
            operationId: MyFestivalService_ListBookmarks
            parameters:
                - name: festival
                  in: path
                  description: The festival id.
                  required: true
                  schema:
                    type: string
                - name: pageSize
                  in: query
                  description: |-
                    Maximum number of bookmarks to return. The server default returns all of
                     the caller's bookmarks for the festival in a single page (festival drink
                     counts are bounded). Set explicitly to paginate.
                  schema:
                    type: integer
                    format: int32
                - name: pageToken
                  in: query
                  description: Page token from a previous ListBookmarks response.
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListBookmarksResponse'
