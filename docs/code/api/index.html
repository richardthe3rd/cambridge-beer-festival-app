<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cambridge Beer Festival — MyFestival API</title>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <style>
      body {
        margin: 0;
        padding: 0;
      }

      /* Prevent code blocks overflowing and creating horizontal scroll */
      pre {
        overflow-x: auto;
      }

      /* Prevent iOS Safari zooming when the search field is focused */
      input[type="search"] {
        font-size: 16px !important;
      }
    </style>
  </head>
  <body>
    <div id="redoc-container"></div>
    <script src="redoc.standalone.js"></script>
    <script>
      Redoc.init(
        'openapi.yaml',
        {
          expandResponses: 'all',
          requiredPropsFirst: true,
          hideSingleRequestSampleTab: true,
          schemaExpansionLevel: 1,
          jsonSampleExpandLevel: 2,
          sideNavStyle: 'summary-only',
        },
        document.getElementById('redoc-container'),
      );
    </script>
  </body>
</html>
