name: cambridge_beer_festival
description: A Flutter app for Cambridge Beer Festival - browse beers, ciders, meads, and more.
publish_to: 'none'
version: 2026.5.9+2026053109

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  url_launcher: ^6.2.2
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  share_plus: ^13.1.0
  firebase_core: ^4.10.0
  firebase_crashlytics: ^5.2.3
  firebase_analytics: ^12.4.2
  package_info_plus: ^10.1.0
  collection: ^1.18.0
  go_router: ^17.3.0
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ">=5.4.4 <5.7.0"
  build_runner: ^2.4.8
  url_launcher_platform_interface: ^2.3.0
  plugin_platform_interface: ^2.1.7
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: 'launcher_icon'
  ios: false
  image_path: 'web/icons/Icon-512.png'
  min_sdk_android: 21
  adaptive_icon_background: '#FFFFFF'
  adaptive_icon_foreground: 'web/icons/Icon-512.png'

flutter:
  uses-material-design: true
  assets:
    - assets/
