// Online "my festival" API: personal drink entries and shared aggregates.
syntax = "proto3";

package cambeerfestival.myfestival.v1alpha;

import "cambeerfestival/myfestival/v1alpha/drink_entry.proto";
import "cambeerfestival/myfestival/v1alpha/drink_summary.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";
import "google/rpc/status.proto";

// Stores each caller's personal festival state and serves back festival-scoped
// aggregates. Writes are local-first on the client; this service holds the
// shared, cross-device state.
//
// Personal state is modelled as a single DrinkEntry resource per (caller,
// drink), replacing the former per-signal singletons (Bookmark, Note, Tasting,
// Review). This collapses "hydrate my festival state on app open" from four
// List calls to one.
//
// Sync machinery built into the DrinkEntry contract:
//   etag            — optimistic concurrency (If-Match on Update/Delete)
//   allow_missing   — upsert and idempotent-replay semantics (AIP-134)
//   soft delete     — DeleteDrinkEntry sets delete_time so the deletion
//                     propagates as a delta to other devices
//   filter          — AIP-160 filter on ListDrinkEntries for delta sync
//                     (e.g. update_time > "2025-01-01T00:00:00Z")
//   batch           — BatchUpdateDrinkEntries for offline-flush (AIP-235)
//
// The caller's identity is resolved from the auth context and never appears in
// resource names, keeping device IDs private and making sign-in upgrades
// transparent to existing clients.
service MyFestivalService {
  option (google.api.default_host) = "api.cambeerfestival.app";

  // --- Personal drink entries (caller-scoped singletons) --------------------
  // Get the caller's personal state for a drink.
  rpc GetDrinkEntry(GetDrinkEntryRequest) returns (DrinkEntry) {
    option (google.api.http) = {get: "/v1alpha/{name=festivals/*/drinks/*/entry}"};
    option (google.api.method_signature) = "name";
  }

  // Create or update the caller's personal state for a drink.
  //
  // Set allow_missing to true to create the entry if it does not exist (upsert
  // semantics, AIP-134). If the entry has been soft-deleted, allow_missing
  // resurrects it (clears delete_time) and applies the update.
  //
  // For If-Match concurrency control (AIP-154): proto-native clients echo
  // DrinkEntry.etag in drink_entry.etag; REST/HTTP clients send it in the
  // If-Match request header. The server returns ABORTED on a stale etag;
  // re-fetch and retry.
  //
  // To clear an optional signal, include the field in update_mask and send it
  // absent (is_favourite, star_rating, would_recommend, pours) or as empty
  // string (note).
  rpc UpdateDrinkEntry(UpdateDrinkEntryRequest) returns (DrinkEntry) {
    option (google.api.http) = {
      patch: "/v1alpha/{drink_entry.name=festivals/*/drinks/*/entry}"
      body: "drink_entry"
    };
    option (google.api.method_signature) = "drink_entry,update_mask";
  }

  // Soft-delete the caller's personal entry for a drink.
  //
  // Sets delete_time and advances update_time rather than permanently removing
  // the entry, so the deletion propagates to other devices via delta sync.
  // Returns the tombstone with delete_time set.
  //
  // Set allow_missing to suppress errors when the entry does not exist
  // (idempotent replay). Set etag to enforce If-Match semantics.
  //
  // Soft-deleted entries are excluded from normal List results; use
  // show_deleted on ListDrinkEntries to retrieve tombstones.
  rpc DeleteDrinkEntry(DeleteDrinkEntryRequest) returns (DrinkEntry) {
    option (google.api.http) = {delete: "/v1alpha/{name=festivals/*/drinks/*/entry}"};
    option (google.api.method_signature) = "name";
  }

  // List the caller's personal entries for all drinks at a festival.
  //
  // A single call hydrates all personal state on app open. Use filter with an
  // AIP-160 expression (e.g. update_time > "2025-01-01T00:00:00Z") for delta
  // sync. Set show_deleted to include soft-deleted tombstones so other devices
  // learn about deletions.
  rpc ListDrinkEntries(ListDrinkEntriesRequest) returns (ListDrinkEntriesResponse) {
    option (google.api.http) = {get: "/v1alpha/{parent=festivals/*}/drinkEntries"};
    option (google.api.method_signature) = "parent";
  }

  // Flush a batch of offline mutations for a festival (AIP-235).
  //
  // Applies each UpdateDrinkEntryRequest independently. Intended for
  // offline-first clients that queue mutations locally and flush on reconnect.
  // Partial failure is possible; inspect each entry in the response.
  rpc BatchUpdateDrinkEntries(BatchUpdateDrinkEntriesRequest) returns (BatchUpdateDrinkEntriesResponse) {
    option (google.api.http) = {
      post: "/v1alpha/{parent=festivals/*}/drinkEntries:batchUpdate"
      body: "*"
    };
    option (google.api.method_signature) = "parent,requests";
  }

  // --- Aggregates (public, not caller-scoped) --------------------------------
  // Get the aggregate signals for a single drink.
  rpc GetDrinkSummary(GetDrinkSummaryRequest) returns (DrinkSummary) {
    option (google.api.http) = {get: "/v1alpha/{name=festivals/*/drinkSummaries/*}"};
    option (google.api.method_signature) = "name";
  }

  // List aggregate signals for every drink at a festival.
  //
  // A single call populates the festival-wide drinks grid with community data.
  rpc ListDrinkSummaries(ListDrinkSummariesRequest) returns (ListDrinkSummariesResponse) {
    option (google.api.http) = {get: "/v1alpha/{parent=festivals/*}/drinkSummaries"};
    option (google.api.method_signature) = "parent";
  }
}

// Request message for GetDrinkEntry.
message GetDrinkEntryRequest {
  // Resource name: festivals/{festival}/drinks/{drink}/entry.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "api.cambeerfestival.app/DrinkEntry"
  ];
}

// Request message for UpdateDrinkEntry.
message UpdateDrinkEntryRequest {
  // The entry to write. Its `name` field identifies the resource. Proto-native
  // clients echo DrinkEntry.etag here for If-Match concurrency control;
  // REST/HTTP clients use the If-Match request header instead.
  DrinkEntry drink_entry = 1 [(google.api.field_behavior) = REQUIRED];

  // Fields to update. Omit to replace all writable fields. Specify individual
  // fields (e.g. `star_rating`, `is_favourite`) to update one signal without
  // affecting others.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];

  // If true, the entry is created when it does not already exist (upsert
  // semantics, AIP-134). If the entry is soft-deleted, allow_missing
  // resurrects it (clears delete_time) and applies the update.
  bool allow_missing = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for DeleteDrinkEntry.
message DeleteDrinkEntryRequest {
  // Resource name: festivals/{festival}/drinks/{drink}/entry.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "api.cambeerfestival.app/DrinkEntry"
  ];

  // If true, no error is returned when the entry does not exist (idempotent
  // replay). Defaults to false.
  bool allow_missing = 2 [(google.api.field_behavior) = OPTIONAL];

  // If set, must match the current etag of the entry (If-Match). The server
  // returns ABORTED when stale.
  string etag = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for ListDrinkEntries.
message ListDrinkEntriesRequest {
  // Parent festival: festivals/{festival}.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "api.cambeerfestival.app/Festival"
  ];

  // Maximum number of entries to return. The server default returns all of the
  // caller's entries for the festival in a single page (festival drink counts
  // are bounded). Set explicitly to paginate.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // Page token from a previous ListDrinkEntries response.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // AIP-160 filter expression. Supported fields: update_time.
  // Example: update_time > "2025-01-01T00:00:00Z" for delta sync.
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // If true, soft-deleted entries (those with a non-null delete_time) are
  // included in the response. Use during delta sync to propagate deletions
  // from other devices.
  bool show_deleted = 5 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for ListDrinkEntries.
message ListDrinkEntriesResponse {
  // The caller's entries for this page, one per drink with any personal state.
  repeated DrinkEntry drink_entries = 1;

  // Token for the next page; empty when there are no more results.
  string next_page_token = 2;

  // Total number of drinks the caller has any personal state for at this
  // festival (excluding soft-deleted entries unless show_deleted was set).
  int32 total_size = 3;
}

// Request message for BatchUpdateDrinkEntries.
message BatchUpdateDrinkEntriesRequest {
  // Parent festival: festivals/{festival}. The festival segment of every
  // drink_entry.name in requests must match this parent.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "api.cambeerfestival.app/Festival"
  ];

  // Individual update requests to apply. Each entry is processed independently;
  // partial failure is possible.
  repeated UpdateDrinkEntryRequest requests = 2 [(google.api.field_behavior) = REQUIRED];
}

// Response message for BatchUpdateDrinkEntries.
message BatchUpdateDrinkEntriesResponse {
  // The updated entries, in the same order as the requests. An entry is
  // populated only when the corresponding status code is OK.
  repeated DrinkEntry drink_entries = 1;

  // Per-item outcomes, in the same order as BatchUpdateDrinkEntriesRequest.requests.
  // Always the same length as requests. Check status.code before using the
  // corresponding entry; on failure the entry slot is empty.
  repeated google.rpc.Status statuses = 2;
}

// Request message for GetDrinkSummary.
message GetDrinkSummaryRequest {
  // Resource name: festivals/{festival}/drinkSummaries/{drink}.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).type = "api.cambeerfestival.app/DrinkSummary"
  ];
}

// Request message for ListDrinkSummaries.
message ListDrinkSummariesRequest {
  // Parent festival: festivals/{festival}.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference).child_type = "api.cambeerfestival.app/DrinkSummary"
  ];

  // Maximum number of summaries to return. The server default returns all
  // summaries for the festival in a single page (drink counts are bounded).
  // Set explicitly to paginate.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // Page token from a previous ListDrinkSummaries response.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for ListDrinkSummaries.
message ListDrinkSummariesResponse {
  // Aggregate signals for this page, one per drink.
  repeated DrinkSummary drink_summaries = 1;

  // Token for the next page; empty when there are no more results.
  string next_page_token = 2;

  // Total number of drinks with any aggregate data at this festival.
  int32 total_size = 3;
}
