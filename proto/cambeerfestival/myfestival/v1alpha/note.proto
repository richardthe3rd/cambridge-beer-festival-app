// Caller tasting note for the online "my festival" API.
syntax = "proto3";

package cambeerfestival.myfestival.v1alpha;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

// The caller's free-text tasting note for one drink at one festival.
//
// Singleton resource — one per (caller, drink). The caller is implicit in the
// auth context. A note is independent of a Review: you can note without rating,
// or rate without noting.
message Note {
  option (google.api.resource) = {
    type: "api.cambeerfestival.app/Note"
    pattern: "festivals/{festival}/drinks/{drink}/note"
    singular: "note"
    plural: "notes"
  };

  // Resource name: festivals/{festival}/drinks/{drink}/note.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The caller's note text. Max 2000 Unicode characters.
  string content = 2 [(google.api.field_behavior) = REQUIRED];

  // When this note was last written.
  google.protobuf.Timestamp update_time = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}
