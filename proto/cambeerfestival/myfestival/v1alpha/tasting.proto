// Caller tasting log and festival-wide tasting counts for the online "my festival" API.
syntax = "proto3";

package cambeerfestival.myfestival.v1alpha;

option go_package = "github.com/cambeerfestival/api/gen/go/cambeerfestival/myfestival/v1alpha;myfestivalv1alpha";

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

// A record that the caller has tried a drink at a festival.
//
// Singleton resource — one per (caller, drink). The caller is implicit in the
// auth context. `pours` tracks how many times the caller has had this drink at
// the festival (e.g. returned for a second half-pint); absent means one pour.
message Tasting {
  option (google.api.resource) = {
    type: "api.cambeerfestival.app/Tasting"
    pattern: "festivals/{festival}/drinks/{drink}/tasting"
    singular: "tasting"
    plural: "tastings"
  };

  // Resource name: festivals/{festival}/drinks/{drink}/tasting.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // How many times the caller has had this drink. Absent means one pour.
  // Must be >= 1 when present.
  optional int32 pours = 2 [(google.api.field_behavior) = OPTIONAL];

  // When the caller first tried this drink.
  google.protobuf.Timestamp create_time = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When this record was last updated.
  google.protobuf.Timestamp update_time = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Computed, read-only aggregate of how many callers have tried a drink.
//
// Useful for social discovery ("N people have tried this"). Keyed by drink
// under the festival, matching the ReviewSummary pattern.
message TastingSummary {
  option (google.api.resource) = {
    type: "api.cambeerfestival.app/TastingSummary"
    pattern: "festivals/{festival}/tastingSummaries/{drink}"
    singular: "tastingSummary"
    plural: "tastingSummaries"
  };

  // Resource name: festivals/{festival}/tastingSummaries/{drink}.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Number of distinct callers who have logged a tasting for this drink.
  int32 taster_count = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Total pours logged across all callers.
  int32 total_pours = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}
