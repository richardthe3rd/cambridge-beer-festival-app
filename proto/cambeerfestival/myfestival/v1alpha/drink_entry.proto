// Caller personal-state resource for the online "my festival" API.
syntax = "proto3";

package cambeerfestival.myfestival.v1alpha;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

// The Festival (festivals/{festival}) and Drink
// (festivals/{festival}/drinks/{drink}) parent types referenced by this
// resource's pattern are defined canonically by the catalog API
// (cambeerfestival.catalog.v1alpha) and resolve within the same buf module, so
// no resource_definition stubs are needed here.
//
// The caller's personal state for one drink at one festival: favourite status,
// star rating, recommendation answer, tasting note, and pour count in a single
// resource.
//
// Singleton resource — one per (caller, drink). The caller is implicit in the
// auth context; their identity never appears in the resource name, keeping
// device IDs private and making the sign-in upgrade transparent to clients.
//
// All signals are optional and independent. To clear a signal, include the
// field in update_mask and send it absent or at its zero value:
//   - Optional fields (is_favourite, star_rating, would_recommend, pours):
//     send the field absent (no presence bit set) to clear it.
//   - String field (note): send an empty string to clear it.
// This propagates as a normal field delta.
//
// Concurrency is guarded by etag (AIP-154). Clients read the current etag,
// then echo it for If-Match: proto-native clients via drink_entry.etag on the
// next UpdateDrinkEntry call; REST/HTTP clients via the If-Match request
// header. The server returns ABORTED on stale etag; re-fetch and retry.
// This makes pour increments safe under concurrent writes without a dedicated
// :addPour custom method.
message DrinkEntry {
  option (google.api.resource) = {
    type: "api.cambeerfestival.app/DrinkEntry"
    pattern: "festivals/{festival}/drinks/{drink}/entry"
    singular: "drinkEntry"
    plural: "drinkEntries"
  };

  // Resource name: festivals/{festival}/drinks/{drink}/entry.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Opaque server-assigned concurrency token (AIP-154). To enable optimistic
  // locking (If-Match semantics):
  //   - Proto-native clients: echo this value in drink_entry.etag on the next
  //     UpdateDrinkEntry call, or in DeleteDrinkEntryRequest.etag.
  //   - REST/HTTP clients: send this value in the If-Match request header.
  // The server returns ABORTED when stale; re-fetch and retry.
  string etag = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Whether the caller has favourited this drink. Absent if not yet set.
  // True means favourited; false means explicitly un-favourited.
  optional bool is_favourite = 3 [(google.api.field_behavior) = OPTIONAL];

  // Star rating, 1–5 inclusive. Absent if the caller has not set a rating.
  optional int32 star_rating = 4 [(google.api.field_behavior) = OPTIONAL];

  // Whether the caller would recommend this drink. Absent if not answered.
  optional bool would_recommend = 5 [(google.api.field_behavior) = OPTIONAL];

  // The caller's free-text tasting note. Max 2000 Unicode characters. Empty
  // string means no note; to clear an existing note, send note="" with "note"
  // in update_mask.
  string note = 6 [(google.api.field_behavior) = OPTIONAL];

  // How many times the caller has had this drink. Absent means not yet tried;
  // 1 means tried once; > 1 records repeated pours. To increment, read the
  // current value, add 1, and write back with UpdateDrinkEntryRequest.etag set.
  optional int32 pours = 7 [(google.api.field_behavior) = OPTIONAL];

  // When the caller first created this entry (first signal recorded).
  google.protobuf.Timestamp create_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When any signal on this entry was last changed. Soft deletion (via
  // DeleteDrinkEntry) also advances this field, ensuring tombstones appear in
  // delta-sync results when filtering on update_time.
  google.protobuf.Timestamp update_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Set when this entry has been soft-deleted. Soft-deleted entries are
  // excluded from normal List results but returned when show_deleted is true.
  // Soft deletion propagates the "no personal state" signal to other devices
  // during delta sync.
  google.protobuf.Timestamp delete_time = 10 [(google.api.field_behavior) = OUTPUT_ONLY];
}
